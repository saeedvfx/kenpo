<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kenpo">
<title>Kenpo Daily Training</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;
  --border:#2e2e2e;--border2:#3a3a3a;
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --gold:#c9a96e;--gold-dim:#8a6d3b;
  --r:12px;--rsm:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:16px;line-height:1.5;overscroll-behavior:none}

.header{background:var(--bg);padding:env(safe-area-inset-top,16px) 20px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10}
.header-crest{width:46px;height:46px;object-fit:contain;flex-shrink:0;opacity:0.9}
.header-sup{font-size:9px;color:var(--gold);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:2px}
.header-title{font-size:19px;font-weight:600;letter-spacing:0.02em;font-family:Georgia,serif;color:var(--text)}
.header-sub{font-size:10px;color:var(--text3);margin-top:1px}

.day-nav{background:var(--bg);padding:10px 20px;display:flex;gap:6px;overflow-x:auto;border-bottom:0.5px solid var(--border);-webkit-overflow-scrolling:touch;scrollbar-width:none}
.day-nav::-webkit-scrollbar{display:none}
.day-btn{font-size:10px;font-weight:600;padding:6px 12px;border-radius:20px;white-space:nowrap;border:0.5px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;letter-spacing:0.05em;text-transform:uppercase;font-family:-apple-system,sans-serif;transition:all 0.15s;flex-shrink:0}
.day-btn.active{background:var(--gold);color:#111;border-color:var(--gold)}

.session-meta{padding:12px 20px;border-bottom:0.5px solid var(--border)}
.session-belt{font-size:15px;font-weight:600;color:var(--text)}
.session-detail{font-size:10px;color:var(--text3);margin-top:2px}

.content{padding:12px 16px 40px;display:flex;flex-direction:column;gap:8px}

.phase{background:var(--bg2);border-radius:var(--r);border:0.5px solid var(--border);overflow:hidden}
.phase.gold-border{border-color:var(--gold-dim)}
.phase-header{display:flex;align-items:center;padding:12px 14px;gap:10px;cursor:pointer}
.phase-n{font-size:10px;color:var(--text3);min-width:14px}
.phase-name{font-size:13px;font-weight:500;color:var(--text);flex:1}
.phase-name.gold{color:var(--gold)}
.phase-time{font-size:10px;color:var(--text3);margin-right:6px}
.phase-chevron{font-size:9px;color:var(--text3);transition:transform 0.2s;flex-shrink:0}
.phase.open .phase-chevron{transform:rotate(180deg)}
.phase-body{display:none;border-top:0.5px solid var(--border);padding:10px 14px;background:#161616}
.phase.open .phase-body{display:block}

.item-list{list-style:none;display:flex;flex-direction:column;gap:9px}
.item{display:flex;align-items:center;gap:10px}
.item-n{font-size:10px;color:var(--text3);min-width:20px;font-variant-numeric:tabular-nums;flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:13px;color:var(--text);line-height:1.3}
.item-sub{font-size:10px;color:var(--text3);margin-top:1px}



.phase-tip{margin-top:10px;padding:8px 10px;border-left:2px solid var(--border2);font-size:11px;color:var(--text3);line-height:1.5}
.review-label{font-size:9px;padding:2px 7px;border-radius:4px;background:rgba(201,169,110,0.12);border:0.5px solid var(--gold-dim);color:var(--gold);letter-spacing:0.06em;display:inline-block;margin-bottom:8px}
</style>
</head>
<body>
<div class="header">
  <img class="header-crest" id="crestImg" alt="Kenpo Karate">
  <div class="header-text">
    <div class="header-sup">Ed Parker's American Kenpo</div>
    <div class="header-title">Daily Training</div>
    <div class="header-sub">7-day cycle · 3rd Degree Brown</div>
  </div>
</div>
<div class="day-nav" id="dayNav"></div>
<div class="session-meta">
  <div class="session-belt" id="sessionBelt"></div>
  <div class="session-detail" id="sessionDetail"></div>
</div>
<div class="content" id="content"></div>

const DAY_LABELS=['D1','D2','D3','D4','D5','D6','D7'];
const DAY_BELTS=['Yellow','Orange','Purple','Blue','Green','3° Brn','2° Brn'];
let active=0;

function makePlayBtn(url) {
  // Videos removed — no play buttons
  return null;
}

function makeItem(num, name, sub, url) {
  const li = document.createElement('li');
  li.className = 'item';
  const n = document.createElement('span');
  n.className = 'item-n';
  n.textContent = num !== null ? num + '.' : '·';
  const info = document.createElement('div');
  info.className = 'item-info';
  const nm = document.createElement('div');
  nm.className = 'item-name';
  nm.textContent = name;
  info.appendChild(nm);
  if (sub) {
    const sb = document.createElement('div');
    sb.className = 'item-sub';
    sb.textContent = sub;
    info.appendChild(sb);
  }
  li.appendChild(n);
  li.appendChild(info);
  return li;
}

function makePhase(num, name, time, items, tip, open, isReview, isGold) {
  const ph = document.createElement('div');
  ph.className = 'phase' + (open?' open':'') + (isGold?' gold-border':'');
  const hdr = document.createElement('div');
  hdr.className = 'phase-header';
  const n = document.createElement('span');
  n.className = 'phase-n';
  n.textContent = num;
  const nm = document.createElement('span');
  nm.className = 'phase-name' + (isGold?' gold':'');
  nm.textContent = (isReview?'⟳ ':'') + name;
  const t = document.createElement('span');
  t.className = 'phase-time';
  t.textContent = time;
  const ch = document.createElement('span');
  ch.className = 'phase-chevron';
  ch.textContent = '▾';
  hdr.appendChild(n); hdr.appendChild(nm); hdr.appendChild(t); hdr.appendChild(ch);
  hdr.onclick = () => ph.classList.toggle('open');
  ph.appendChild(hdr);
  const body = document.createElement('div');
  body.className = 'phase-body';
  if (isReview) {
    const lbl = document.createElement('div');
    lbl.className = 'review-label';
    lbl.textContent = '2nd Brown · every session';
    body.appendChild(lbl);
  }
  const ul = document.createElement('ul');
  ul.className = 'item-list';
  items.forEach(it => ul.appendChild(it));
  body.appendChild(ul);
  if (tip) {
    const tp = document.createElement('div');
    tp.className = 'phase-tip';
    tp.textContent = tip;
    body.appendChild(tp);
  }
  ph.appendChild(body);
  return ph;
}

function render() {
  const s = SESSIONS[active];
  // Day nav
  const nav = document.getElementById('dayNav');
  nav.innerHTML = '';
  SESSIONS.forEach((_,i) => {
    const b = document.createElement('button');
    b.className = 'day-btn' + (i===active?' active':'');
    b.textContent = DAY_LABELS[i] + ' · ' + DAY_BELTS[i];
    b.onclick = () => { active=i; render(); };
    nav.appendChild(b);
  });
  // Meta
  document.getElementById('sessionBelt').textContent = s.belt;
  const setNames = s.hasSets ? SETS[s.setsIdx].map(x=>x.name).join(', ') : 'No sets';
  const rev = !s.isBrown2 ? ' · 2nd Brown: ' + BROWN2_REVIEW[active].length + ' techniques' : '';
  document.getElementById('sessionDetail').textContent = s.techniques.length + ' techniques · ' + s.dur + ' · ' + setNames + rev;
  // Phases
  const content = document.getElementById('content');
  content.innerHTML = '';
  let pn = 1;
  // Forms
  const formItems = FORMS[active].map(f => makeItem(null, f.name, 'Full run-through', null));
  content.appendChild(makePhase(pn++,'Forms','~4 min',formItems,'Start here every session. Deliberate pace — feel each transition.',true,false,false));
  // Sets
  if (s.hasSets) {
    const setItems = SETS[s.setsIdx].map(st => makeItem(null, st.name, null, null));
    content.appendChild(makePhase(pn++,'Sets','~3 min',setItems,null,false,false,false));
  }
  // Techniques
  const techItems = s.techniques.map((t,i) => {
    return makeItem(i+1, t.name, t.attack, null);
  });
  const techTip = s.isBrown2 ? 'Your focus belt. Take extra time on anything that feels uncertain.' : 'Work through each technique in sequence. Clean reps over speed.';
  content.appendChild(makePhase(pn++, s.isBrown2 ? '2nd Brown — full belt' : s.belt + ' techniques', '~'+Math.round(s.techniques.length*1.1)+' min', techItems, techTip, false, false, false));
  // 2nd Brown review
  if (!s.isBrown2) {
    const revItems = BROWN2_REVIEW[active].map((t,i) => {
      return makeItem(i+1, t.name, t.attack, null);
    });
    content.appendChild(makePhase(pn++,'2nd Brown closing review','~'+(BROWN2_REVIEW[active].length*2)+' min',revItems,'End every session here. Consistency is how you close the gap.',false,true,true));
  }
}
